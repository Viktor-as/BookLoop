services:
  mysql:
    image: mysql:8
    container_name: readloop-mysql
    restart: unless-stopped
    env_file: .env.example
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./.docker_data/mysql:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -u$$MYSQL_USER -p$$MYSQL_PASSWORD || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "3307:3306"

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: readloop-app
    restart: unless-stopped
    env_file: .env.example
    # Regex end-`$` is set here: Compose + dotenv mangle a lone `$` in .env values.
    environment:
      CORS_ALLOW_ORIGIN: '^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$$'
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./.docker_data/var:/var/www/html/var
      - ./.docker_data/jwt:/var/www/html/config/jwt
    ports:
      - "8080:80"

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: readloop-phpmyadmin
    restart: unless-stopped
    env_file: .env.example
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8081:80"
