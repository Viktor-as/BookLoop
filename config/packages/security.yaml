security:
    password_hashers:
        App\Entity\Users:
            algorithm: bcrypt

    providers:
        users:
            entity:
                class: App\Entity\Users
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        api:
            pattern: ^/api
            stateless: true
            provider: users
            jwt: ~

        web:
            pattern: ^/
            stateless: true
            provider: users
            jwt: ~

    access_control:
        - { path: ^/api/v1/auth/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/auth/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/books, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/v1/admin, roles: ROLE_ADMIN }
        - { path: ^/api/v1, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/logout, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/overdue-borrows, roles: ROLE_ADMIN }
        - { path: ^/, roles: PUBLIC_ACCESS }

when@test:
    security:
        password_hashers:
            App\Entity\Users:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
